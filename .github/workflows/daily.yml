name: 일일 의료 포털 자동화

on:
  schedule:
    - cron: '1 23 * * *'  # 매일 08:01 KST (UTC 23:01 전날)
  workflow_dispatch:        # 수동 실행 (Actions 탭 → "Run workflow")

jobs:
  daily-routine:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
          sudo apt-get install -y xvfb

      - name: credentials.json 생성
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: echo "$CREDENTIALS_JSON" > credentials.json

      - name: 일일 자동화 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: xvfb-run -a python3 scripts/daily_runner.py --headed

      - name: 스크린샷 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: scripts/logs/
          if-no-files-found: ignore
          retention-days: 7
