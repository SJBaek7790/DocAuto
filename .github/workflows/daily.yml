name: 일일 의료 포털 자동화

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 08:00 KST (UTC 23:00 전날)
  workflow_dispatch:        # 수동 실행 (Actions 탭에서 "Run workflow")

jobs:
  daily-routine:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: credentials.json 생성
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: echo "$CREDENTIALS_JSON" > credentials.json

      # ── 키메디 ──────────────────────────────────────────────
      - name: 키메디 출석 (bjh7790)
        id: keymedi
        run: python3 scripts/keymedi.py
        continue-on-error: true

      - name: 키메디 결과
        run: echo "keymedi → ${{ steps.keymedi.outcome }}"

      # ── HMP ─────────────────────────────────────────────────
      - name: HMP 캡슐 출석 (bjh7790)
        id: hmp
        run: python3 scripts/hmp.py
        continue-on-error: true

      - name: HMP 결과
        run: echo "hmp → ${{ steps.hmp.outcome }}"

      # ── 닥터빌 bjh7790 ──────────────────────────────────────
      - name: 닥터빌 출석 (bjh7790)
        id: dv_attend_bjh
        run: python3 scripts/doctorville.py --account bjh7790 --task attend
        continue-on-error: true

      - name: 닥터빌 퀴즈 (bjh7790)
        id: dv_quiz_bjh
        run: python3 scripts/doctorville.py --account bjh7790 --task quiz
        continue-on-error: true

      - name: 닥터빌 세미나 (bjh7790)
        id: dv_seminar_bjh
        run: python3 scripts/doctorville.py --account bjh7790 --task seminar
        continue-on-error: true

      # ── 닥터빌 wonju ────────────────────────────────────────
      - name: 닥터빌 출석 (wonju)
        id: dv_attend_wonju
        run: python3 scripts/doctorville.py --account wonju --task attend
        continue-on-error: true

      - name: 닥터빌 퀴즈 (wonju)
        id: dv_quiz_wonju
        run: python3 scripts/doctorville.py --account wonju --task quiz
        continue-on-error: true

      - name: 닥터빌 세미나 (wonju)
        id: dv_seminar_wonju
        run: python3 scripts/doctorville.py --account wonju --task seminar
        continue-on-error: true

      # ── 로그 보존 ───────────────────────────────────────────
      - name: 스크린샷 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: scripts/logs/
          if-no-files-found: ignore
          retention-days: 7
